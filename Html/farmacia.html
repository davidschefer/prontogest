<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="../Css/base.css">
  <link rel="stylesheet" href="../Css/farmacia.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <title>Farmácia - ProntoGest</title>
</head>

<body>
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="icon">
      <img src="../img/logo.png" class="logo-sidebar">
    </div>

    <a href="./dashboard.html">Dashboard</a>
    <a href="./pacientes.html">Cadastro</a>
    <a href="./triagem.html">Triagem</a>
    <a href="./prontuario.html">Prontuário</a>
    <a href="./prescricoes.html">Prescrições</a>
    <a href="./leitos.html">Leitos</a>
    <a href="./farmacia.html">Farmácia</a>
    <a href="./medicamentos.html">Medicamentos Padrão</a>
    <a href="./consultas.html">Agenda</a>
    <a href="./relatorios.html">Relatórios</a>
    <a href="./faturamento.html" class="admin-only">Faturamento</a>
    <a href="./lista-pacientes.html">Lista de Pacientes</a>
    <a href="./funcionarios-cadastro.html" class="admin-only">Cadastro de Funcionários</a>
    <a href="./funcionarios-lista.html" class="admin-only">Funcionários</a>

    <button class="btn-sair" onclick="logout()">Sair</button>
  </div>

  <!-- CONTEÚDO -->
  <div class="content">
    <h1>Controle de Farmácia</h1>

<div class="card card-sgh-md">
      <div class="linha-form">
        <div>
          <label>Medicamento:</label>
          <input type="text" id="medicamento" list="medicamentos-sugestoes">
          <datalist id="medicamentos-sugestoes"></datalist>
        </div>
        <div>
          <label>Quantidade:</label>
          <input type="number" id="quantidade" min="1" step="1">
        </div>
      </div>

      <div class="linha-form">
        <div>
          <label>Tipo de Movimento:</label>
          <select id="tipoMovimento">
            <option value="">Selecione...</option>
            <option value="entrada">Entrada</option>
            <option value="saida">Saída</option>
          </select>
        </div>
        <div>
          <label>Lote:</label>
          <input type="text" id="lote">
        </div>
      </div>

      <button type="button" onclick="registrarMovimento()">Registrar Movimento</button>
    </div>

    <div class="lista" id="listaMovimentos">
      <h2>Movimentos Registrados</h2>
    </div>
  </div>
  <script src="../Js/api.js"></script>
  <script src="../Js/auth-guard.js"></script>
  <script src="../Js/menu-guard.js"></script>
  <script src="../Js/logout.js"></script>
  <script src="../Js/farmacia.js"></script>
 
  <script src="../Js/page-user-box.js"></script>
</body>

</html>

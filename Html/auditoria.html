    <button class="btn-sair" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
  </div>

  <!-- CONTEÚDO -->
  <div class="content">
    <h1>Auditoria</h1>
    <p>Somente administradores têm acesso a esta página.</p>

    <div style="margin-top: 20px;">
      <h2>Filtros</h2>

      <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:end;">
        <div>
          <label for="filtroAcao"><strong>Ação</strong></label><br />
          <input id="filtroAcao" type="text" placeholder="ex: create / update / delete / read / login" />
        </div>

        <div>
          <label for="filtroEntidade"><strong>Entidade</strong></label><br />
          <input id="filtroEntidade" type="text" placeholder="ex: pacientes / triagens / faturas..." />
        </div>

        <div>
          <label for="filtroUsuario"><strong>Usuário</strong></label><br />
          <input id="filtroUsuario" type="text" placeholder="ex: admin@oaa.com" />
        </div>

        <div>
          <label for="filtroLimit"><strong>Limite</strong></label><br />
          <input id="filtroLimit" type="number" min="1" max="1000" value="200" />
        </div>

        <button type="button" onclick="carregarAuditoria()">Buscar</button>
        <button type="button" onclick="limparFiltros()">Limpar</button>
      </div>
    </div>

    <div style="margin-top: 25px;">
      <h2>Registros</h2>
      <div id="auditoriaStatus"></div>
      <div id="auditoriaLista"></div>
    </div>
  </div>

  <!-- Guards / API Padrão do seu projeto -->

  <!-- SIDEBAR -->

    <a href="./dashboard.html">Dashboard</a>

    <button class="btn-sair" onclick="logout()">Sair</button>
  </aside>

  <!-- CONTEDO -->
  <div class="content">
    <h1>Cadastro de Funcionários</h1>

    <!-- Container único (padronizado) -->
    <div class="func-card card-sgh-md">

      <form id="formFuncionario">
        <label>Nome completo</label>
        <input type="text" id="nome" required>

        <label>Email (login)</label>
        <input type="email" id="email" required>

        <label>Senha</label>
        <input type="password" id="senha" required>

        <label>rgo regulador</label>
        <select id="orgao">
          <option value="COREN">COREN</option>
          <option value="CRM">CRM</option>
          <option value="CRF">CRF</option>
        </select>

        <label>N do registro</label>
        <input type="text" id="registro" required>

        <label>Assinatura + carimbo (imagem)</label>
        <input type="file" id="assinatura" accept="image/*">

        <button type="submit">Cadastrar Funcionrio</button>
      </form>

    </div>
  </div>

  <script src="../Js/api.js"></script>
  <script src="../Js/auth-guard.js"></script>
  <script src="../Js/menu-guard.js"></script>
  <script src="../Js/logout.js"></script>
  <script src="../Js/cadastro-funcionario.js"></script>
  <script src="../Js/page-user-box.js"></script>
</body>

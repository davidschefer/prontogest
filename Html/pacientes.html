 <div class="content">
    <div class="container">
      <h1>Cadastro de Pacientes</h1>

   <div class="card card-sgh-md">

        <div class="linha-form">
          <div>
            <label>Nome do Paciente <span class="obrigatorio">*</span>:</label>
            <input type="text" id="nome">
          </div>

          <div>
            <label>Data de Nascimento <span class="obrigatorio">*</span>:</label>
            <input type="date" id="nascimento">
          </div>
        </div>

        <div class="linha-form">
          <div>
            <label>Telefone <span class="obrigatorio">*</span>:</label>
            <input type="text" id="telefone" maxlength="15">
          </div>

          <div>
            <label>Telefone do Familiar:</label>
            <input type="text" id="telefoneFamiliar" maxlength="15">
          </div>
        </div>

        <div class="linha-form">
          <div>
            <label>Familiar ou Responsável:</label>
            <input type="text" id="familiarResponsavel" placeholder="Nome do familiar ou responsável">
          </div>

          <div>
            <label>CPF <span class="obrigatorio">*</span>:</label>
            <input type="text" id="cpf" maxlength="14">
          </div>
        </div>

        <div class="linha-form">
          <div>
            <label>Convênio:</label>
            <select id="convenio" onchange="verificarCampos()">
              <option value="">Selecione...</option>
              <option value="SUS">SUS</option>
              <option value="Plano de Saúde">Plano de Saúde</option>
              <option value="Particular">Particular</option>
            </select>
          </div>
          <div></div>
        </div>

        <div id="planoSaude">
          <label>Qual plano?</label>
          <input type="text" id="planoSaudeInput">
        </div>

        <h3>Endereço</h3>

        <div class="linha-form">
          <div>
            <label>Rua:</label>
            <input type="text" id="rua">
          </div>
          <div>
            <label>Número:</label>
            <input type="text" id="numero">
          </div>
        </div>

        <div class="linha-form">
          <div>
            <label>Cidade:</label>
            <input type="text" id="cidade">
          </div>
          <div>
            <label>Estado:</label>
            <input type="text" id="estado">
          </div>
        </div>

        <div class="linha-form">
          <div>
            <label>CEP:</label>
            <input type="text" id="cep" maxlength="10">
          </div>
          <div>
            <label>Complemento:</label>
            <input type="text" id="complemento">
          </div>
        </div>

        <button id="cadastrarBtn" onclick="cadastrar()" disabled>
          Cadastrar Paciente
        </button>
      </div>

      <div class="lista" id="listaPacientes">
        <h2>Pacientes Cadastrados</h2>
      </div>

    </div> <!-- container -->
  </div> <!-- content -->

<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../Css/faturamento.css">
    <link rel="stylesheet" href="../Css/base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Faturamento - ProntoGest</title>
</head>

<body>
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="icon">
      <img src="../img/logo.png" class="logo-sidebar">
    </div>

        <a href="./dashboard.html">Dashboard</a>
        <a href="./pacientes.html">Cadastro</a>
        <a href="./triagem.html">Triagem</a>
        <a href="./prontuario.html">Prontuário</a>
        <a href="./prescricoes.html">Prescrições</a>
        <a href="./leitos.html">Leitos</a>
        <a href="./farmacia.html">Farmácia</a>
        <a href="./medicamentos.html">Medicamentos Padrão</a>
        <a href="./consultas.html">Agenda</a>
        <a href="./relatorios.html">Relatórios</a>
        <a href="./faturamento.html" class="admin-only">Faturamento</a>
        <a href="./lista-pacientes.html">Lista de Pacientes</a>
        <a href="./funcionarios-cadastro.html" class="admin-only">Cadastro de Funcionários</a>
        <a href="./funcionarios-lista.html" class="admin-only">Funcionários</a>

        <button class="btn-sair" onclick="logout()">Sair</button>
    </div>

    <!-- CONTEÚDO -->
    <div class="content">
        <h1>Faturamento</h1>

        <!-- Filtro para relatório -->
        <div class="card">
            <div class="linha-form">
                <div>
                    <label>Filtrar por paciente:</label>
                    <select id="pacienteFiltro">
                        <option value="">Todos</option>
                    </select>
                </div>

                <div style="display:flex; align-items:flex-end; gap:10px;">
                    <button type="button" onclick="limparFiltroPaciente()">Limpar filtro</button>
                </div>
            </div>

            <div id="resumoFinanceiro" style="margin-top:10px; font-weight:600;">
                <!-- Preenchido via JS -->
            </div>
        </div>

        <div class="card card-sgh-md">
            <div class="linha-form">
                <div>
                    <label>Paciente:</label>

                    <!-- Alterado: agora é select (mantive id="paciente" para não quebrar o JS atual) -->
                    <select id="paciente" required>
                        <option value="">Selecione...</option>
                        <!-- Opções serão preenchidas via JS com /api/pacientes -->
                    </select>
                </div>

                <div>
                    <label>Convênio:</label>
                    <select id="convenio">
                        <option value="">Selecione...</option>
                        <option value="SUS">SUS</option>
                        <option value="Plano de Saúde">Plano de Saúde</option>
                        <option value="Particular">Particular</option>
                    </select>
                </div>
            </div>

            <div class="linha-form">
                <div>
                    <label>Valor (R$):</label>
                    <input type="number" id="valor" step="0.01">
                </div>
                <div>
                    <label>Descrição:</label>
                    <input type="text" id="descricao">
                </div>
            </div>

            <button onclick="adicionarFatura()">Adicionar Fatura</button>
        </div>

        <div class="lista" id="listaFaturas">
            <h2>Faturas Registradas</h2>
        </div>

        <div class="card total" id="totalGeral">
            Total Geral: R$ 0,00
        </div>
    </div>

    <script src="../Js/api.js"></script>
    <script src="../Js/logout.js"></script>
    <script src="../Js/menu-guard.js"></script>
    <script src="../Js/auth-guard.js"></script>
    <script src="../Js/faturamento.js"></script>
    <script src="../Js/page-user-box.js"></script>
</body>

</html>

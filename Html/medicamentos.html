<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../Css/base.css">
  <link rel="stylesheet" href="../Css/medicamentos.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <title>Medicamentos Padrão - ProntoGest</title>
</head>

<body>
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="icon">
      <img src="../img/logo.png" class="logo-sidebar">
    </div>

    <a href="./dashboard.html">Dashboard</a>
    <a href="./pacientes.html">Cadastro</a>
    <a href="./triagem.html">Triagem</a>
    <a href="./prontuario.html">Prontuário</a>
    <a href="./prescricoes.html">Prescrições</a>
    <a href="./leitos.html">Leitos</a>
    <a href="./farmacia.html">Farmácia</a>
    <a href="./medicamentos.html">Medicamentos Padrão</a>
    <a href="./consultas.html">Agenda</a>
    <a href="./relatorios.html">Relatórios</a>
    <a href="./faturamento.html" class="admin-only">Faturamento</a>
    <a href="./lista-pacientes.html">Lista de Pacientes</a>
    <a href="./funcionarios-cadastro.html" class="admin-only">Cadastro de Funcionários</a>
    <a href="./funcionarios-lista.html" class="admin-only">Funcionários</a>

    <button class="btn-sair" onclick="logout()">Sair</button>
  </div>

  <!-- CONTEÚDO -->
  <div class="content">
    <h1>Medicamentos Padrão</h1>

    <div class="card card-sgh-md">
      <div class="linha-form">
        <div>
          <label>Medicamento:</label>
          <input type="text" id="medPadraoNome" placeholder="Ex: Losartana">
        </div>
        <div>
          <label>Classe:</label>
          <select id="medPadraoClasse"></select>
        </div>
      </div>

      <div class="linha-form">
        <div>
          <label>Observações (opcional):</label>
          <input type="text" id="medPadraoObs" placeholder="Ex: uso contínuo">
        </div>
        <div></div>
      </div>

      <button type="button" id="medPadraoSalvarBtn">Adicionar</button>
    </div>

    <div class="lista" id="medPadraoLista">
      <div class="lista-topo">
        <h2>Lista de Medicamentos</h2>
        <div class="acoes">
          <input type="text" id="medPadraoBusca" placeholder="Buscar medicamento...">
          <button type="button" id="medPadraoSyncBtn">Sincronizar API</button>
        </div>
      </div>
      <div id="medPadraoTabelaWrap"></div>
    </div>
  </div>

  <script src="../Js/api.js"></script>
  <script src="../Js/auth-guard.js"></script>
  <script src="../Js/menu-guard.js"></script>
  <script src="../Js/logout.js"></script>
  <script src="../Js/medicamentos.js"></script>
  <script src="../Js/page-user-box.js"></script>
</body>

</html>
